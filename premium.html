    <!-- Auto-redirect based on browser language -->
    <script>
    (function() {
        // ⚠️ التحقق من وجود معاملات Telegram في URL
        const urlParams = new URLSearchParams(window.location.search);
        const hasTelegramData = urlParams.has('id') && urlParams.has('hash');
        
        if (hasTelegramData) {
            // إذا كان هناك بيانات Telegram، إعادة التوجيه إلى /ar/login.html مع الحفاظ على المعاملات
            console.log('✅ Telegram authentication detected, redirecting to /ar/login.html');
            window.location.replace('/ar/login.html' + window.location.search);
            return;
        }
        
        // Get browser language
        const userLang = (navigator.language || navigator.userLanguage).toLowerCase();
        
        // Language to path mapping for premium pages
        const langMap = {
            'ar': '/premium/ar/',
            'en': '/premium/en/',
            'de': '/premium/de/',
            'es': '/premium/es/',
            'fr': '/premium/fr/',
            'it': '/premium/it/',
            'ru': '/premium/ru/'
        };
        
        // Check if browser language matches any supported language
        for (const [lang, path] of Object.entries(langMap)) {
            if (userLang.startsWith(lang)) {
                window.location.replace(path);
                return;
            }
        }
        
        // Default to English if no match found
        window.location.replace('/premium/en/');
    })();
    </script>
