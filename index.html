    (function() {
        // الحصول على جميع معاملات URL (بما في ذلك رابط الإحالة)

        const queryString = window.location.search; // الحفاظ على جميع المعاملات
        
        // ⚠️ التحقق من وجود معاملات Telegram في URL
        const hasTelegramData = urlParams.has('id') && urlParams.has('hash');
        
        if (hasTelegramData) {

            window.location.replace('/ar/login.html' + queryString);
            return;
        }
        
        // Get browser language
        const userLang = (navigator.language || navigator.userLanguage).toLowerCase();
        
        // Language to path mapping
        const langMap = {
            'ar': '/ar/',
            'en': '/en/',
            'de': '/de/',
            'es': '/es/',
            'fr': '/fr/',
            'it': '/it/',
            'ru': '/ru/'
        };
        
        // Check if browser language matches any supported language
        for (const [lang, path] of Object.entries(langMap)) {
            if (userLang.startsWith(lang)) {
                // الحفاظ على معاملات URL (مثل ref= للإحالة)
                window.location.replace(path + (queryString || ''));
                return;
            }
        }
        
        // Default to English if no match found - مع الحفاظ على المعاملات
        window.location.replace('/en/' + (queryString || ''));
    })();
